<template>
    <div class="spinner">
        <template if:true={isLoading}>
             <lightning-spinner alternative-text="Loading" variant="brand" size="large">
             </lightning-spinner>
        </template>
    </div>
    <article class="slds-card slds-card_boundary">
        <div class="slds-card__header slds-grid ">
            <header class="slds-media slds-media_center slds-has-flexi-truncate slds-grid_align-spread">
                <div class="slds-col slds-grid slds-grid_vertical-align-center">
                    <div class="slds-media_small slds-media__figure">
                        <lightning-icon size="small" icon-name="custom:custom52"></lightning-icon>
                    </div>
                    <h2 title="Title">
                        <b>
                            <span class="slds-text-heading_small">BEAT Alerts</span>
                        </b>
                    </h2>
                </div>
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:refresh" title="Refresh" onclick={refreshComponent}></lightning-button-icon>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">
            <div class="slds-card_boundary slds-grid_vertical">
                <template if:true={wiredRecords}>
                    <template if:true={cmtRecord}>
                        <div class="slds-var-m-around_small slds-var-p-horizontal_small slds-var-p-top_small slds-var-p-bottom_large slds-border_bottom ">       
                            <p>Click on link to reference BEAT Guidelines: <lightning-formatted-url value={cmtRecord.Link__c} label="BEAT Files and Guidelines" target="_blank" ></lightning-formatted-url></p>
                        </div>
                    </template>
                    <template for:each={wiredRecords} for:item="alert">
                        <div key={alert.id} class="slds-var-m-around_small slds-var-p-horizontal_small slds-var-p-top_small slds-var-p-bottom_large slds-grid slds-border_bottom ">
                            <div class="slds-media__figure">
                                <lightning-icon size="x-small" icon-name="action:announcement"></lightning-icon>
                            </div>
                            <div>
                                <template if:true={alert.Event__c}>
                                    <p class="h1">Event: {alert.Event__r.Name}</p>
                                </template>
                                <!-- <p class="h1">Message: &nbsp;</p> -->
                                <lightning-formatted-rich-text value={alert.Message__c}></lightning-formatted-rich-text>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </div>
    </article>
</template>
